services:
  rag:
    build: .
    ports:
      - "8000:8000"
    environment:
      # Defaults run offline. Uncomment for real, free answers on Gemini
      # (one key powers both the LLM and embeddings):
      # EMBEDDING_PROVIDER: gemini
      # LLM_PROVIDER: gemini
      # GEMINI_API_KEY: ${GEMINI_API_KEY}
      EMBEDDING_PROVIDER: hash
      LLM_PROVIDER: echo
    volumes:
      - rag_storage:/app/storage

volumes:
  rag_storage:
